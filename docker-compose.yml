version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: auditai-db
    environment:
      POSTGRES_USER: auditai
      POSTGRES_PASSWORD: auditai
      POSTGRES_DB: auditai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auditai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auditai-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
