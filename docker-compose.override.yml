# Local development override — adds a CI-matching test database
# Usage: docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
services:
  postgres:
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auditai -d auditai_ci || pg_isready -U auditai -d auditai"]
      interval: 5s
      timeout: 3s
      retries: 5
