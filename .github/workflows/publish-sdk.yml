name: Publish SDK

on:
  push:
    tags:
      - "sdk-v*"  # e.g. sdk-v1.0.0, sdk-v1.1.0
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  SDK_DIR: packages/sdk

jobs:
  publish:
    name: Build & Publish securithm-sdk
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC trusted publishing
      packages: write  # Required for GitHub Packages

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install SDK dependencies
        run: npm ci
        working-directory: ${{ env.SDK_DIR }}

      - name: TypeScript typecheck
        run: npm run typecheck
        working-directory: ${{ env.SDK_DIR }}

      - name: Build SDK
        run: npm run build
        working-directory: ${{ env.SDK_DIR }}

      # ── Publish to npmjs.com via OIDC Trusted Publishing ──
      # No NODE_AUTH_TOKEN needed — setup-node + id-token:write + --provenance
      # handles OIDC token exchange with npm registry automatically.
      - name: Publish to npmjs.com
        run: npm publish --access public --provenance
        working-directory: ${{ env.SDK_DIR }}

      # ── Publish to GitHub Packages ──
      - name: Publish to GitHub Packages
        run: |
          # Add auth for GitHub Packages registry inline
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          npm publish --registry=https://npm.pkg.github.com/ --access public
        working-directory: ${{ env.SDK_DIR }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
