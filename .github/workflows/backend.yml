name: Backend CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: securithm
          POSTGRES_PASSWORD: securithm
          POSTGRES_DB: securithm_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio ruff httpx

      - name: Lint with ruff
        run: ruff check backend/

      - name: Test with pytest
        env:
          DATABASE_URL: postgresql://securithm:securithm@localhost:5432/securithm_ci
          DEBUG: "true"
        run: pytest backend/ -v --tb=short --exitfirst
