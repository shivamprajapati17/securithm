name: CI — Frontend + Backend

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Build, Lint, Test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify output
        run: |
          if [ -d ".next" ]; then
            echo "✅ Build output (.next/) exists"
            du -sh .next/
          else
            echo "❌ Build output missing"
            exit 1
          fi

      - name: Run frontend tests
        run: npm test

  backend:
    name: Backend (Lint, Test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: securithm
          POSTGRES_PASSWORD: securithm
          POSTGRES_DB: securithm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx ruff

      - name: Lint backend
        run: ruff check backend/

      - name: Run backend tests (API key management & auth)
        run: |
          python -m pytest backend/tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql://securithm:securithm@localhost:5432/securithm
